[flake8]
max-line-length = 100
exclude = 
    .git,
    __pycache__,
    .pytest_cache,
    venv,
    .venv
ignore = 
    # D100: Missing docstring in public module (handled by pylint)
    D100,
    # D104: Missing docstring in public package
    D104
per-file-ignores =
    # Allow missing docstrings in test files
    tests/*:D103,D101

[tool:pytest]
testpaths = tests
python_files = test_*.py
python_functions = test_*
addopts = -v --tb=short
